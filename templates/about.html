{% extends "base.html" %}
{% block content %}
<section class="block">
  <div class="container" style="max-width: 820px;">
    <h1 class="section-title">О нас</h1>
    <p style="color: var(--muted); font-size: 17px; white-space: pre-line;">{{ about_text }}</p>
    <div style="margin-top: 30px; display:flex; gap:10px; flex-wrap:wrap;">
      {% if site_links.discord %}<a class="btn" href="{{ site_links.discord }}" target="_blank">Discord</a>{% endif %}
      {% if site_links.telegram %}<a class="btn ghost" href="{{ site_links.telegram }}" target="_blank">Telegram</a>{% endif %}
    </div>
  </div>
</section>
{% endblock %}
